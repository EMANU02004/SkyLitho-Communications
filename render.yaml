services:
  - type: web
    name: skylitho
    env: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: skylitho-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
